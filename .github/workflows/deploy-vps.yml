name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_SSH_USER }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Prepare SSH connection variables
        run: |
          PORT="${{ secrets.VPS_SSH_PORT }}"
          if [ -z "$PORT" ]; then
            PORT="22"
          fi
          echo "VPS_PORT=$PORT" >> "$GITHUB_ENV"

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -p "$VPS_PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/ticarnet/current && bash scripts/vps-deploy.sh --branch main --force-clean && echo \"[deploy] current commit: \$(git rev-parse --short HEAD)\" && curl -fsS http://127.0.0.1:8787/api/health"
