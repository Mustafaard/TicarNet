name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, ticarnet-vps]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repo to /var/www/ticarnet/current
        run: |
          set -Eeuo pipefail
          APP_DIR="/var/www/ticarnet/current"
          TMP_ENV="/tmp/ticarnet-server.env"

          rm -f "$TMP_ENV"
          if [ -f "$APP_DIR/server/.env" ]; then
            cp "$APP_DIR/server/.env" "$TMP_ENV"
          fi

          mkdir -p "$APP_DIR"
          shopt -s dotglob nullglob
          rm -rf "${APP_DIR:?}/"*
          cp -a "$GITHUB_WORKSPACE"/. "$APP_DIR"/
          rm -rf "$APP_DIR/.git"

          if [ -f "$TMP_ENV" ]; then
            mkdir -p "$APP_DIR/server"
            mv "$TMP_ENV" "$APP_DIR/server/.env"
          fi

      - name: Deploy on VPS local runner
        run: |
          set -Eeuo pipefail
          APP_DIR="/var/www/ticarnet/current"
          if id deploy >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo -u deploy -H bash -lc "cd '$APP_DIR' && bash scripts/vps-deploy.sh --skip-pull"
            else
              cd "$APP_DIR"
              bash scripts/vps-deploy.sh --skip-pull
            fi
          else
            cd "$APP_DIR"
            bash scripts/vps-deploy.sh --skip-pull
          fi

      - name: Health check
        run: |
          set -Eeuo pipefail
          curl -fsS http://127.0.0.1:8787/api/health
          echo "[deploy] commit: ${GITHUB_SHA}"
